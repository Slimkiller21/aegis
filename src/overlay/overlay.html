<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>blocked</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; }
      body {
        background: rgba(9, 11, 16, 0.985);
        backdrop-filter: blur(44px);
        -webkit-backdrop-filter: blur(44px);
        font-family: "Segoe UI", system-ui, sans-serif;
        color: #eef2f8;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        cursor: default;
      }
      .card {
        max-width: 760px;
        padding: 48px 56px 44px;
        text-align: center;
      }
      .mark {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        font-size: 12.5px;
        letter-spacing: .16em;
        text-transform: uppercase;
        color: #6f9d8e;
        margin-bottom: 30px;
      }
      .mark svg { width: 16px; height: 16px; stroke: #4fae93; fill: none; stroke-width: 2; }
      .eyebrow {
        font-size: 13px;
        letter-spacing: .18em;
        text-transform: uppercase;
        color: #7c869a;
        margin-bottom: 22px;
      }
      blockquote {
        font-size: 30px;
        line-height: 1.42;
        font-weight: 500;
        letter-spacing: -0.01em;
        background: linear-gradient(180deg, #ffffff, #c3ccdb);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .scripture blockquote { font-style: italic; }
      cite {
        display: block;
        margin-top: 26px;
        font-style: normal;
        font-size: 16px;
        font-weight: 600;
        color: #58c4a3;
        letter-spacing: .02em;
      }
      .card { animation: rise 520ms cubic-bezier(.2,.7,.2,1) both; }
      @keyframes rise {
        from { opacity: 0; transform: translateY(20px) scale(.985); }
        to   { opacity: 1; transform: none; }
      }
      /* thin progress bar that empties over the popup's lifetime */
      .bar { position: fixed; left: 0; bottom: 0; height: 3px; width: 100%;
             background: linear-gradient(90deg, #0b7d5e, #4fae93); transform-origin: left;
             transform: scaleX(1); }
      .bar.run { transition: transform linear; transform: scaleX(0); }
    </style>
  </head>
  <body>
    <div class="card" id="card">
      <div class="mark">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z"/></svg>
        NSFW Guard
      </div>
      <div class="eyebrow" id="eyebrow">A word for this moment</div>
      <blockquote id="quote"></blockquote>
      <cite id="cite"></cite>
    </div>
    <div class="bar" id="bar"></div>
    <script>
      const { ipcRenderer } = require('electron');
      const card = document.getElementById('card');
      const bar = document.getElementById('bar');

      ipcRenderer.on('overlay-quote', (_e, q) => {
        q = q || {};
        document.getElementById('quote').textContent = q.text || '';
        document.getElementById('cite').textContent = q.source || '';
        document.getElementById('eyebrow').textContent =
          q.kind === 'scripture' ? 'Scripture' : 'A word for this moment';
        card.classList.toggle('scripture', q.kind === 'scripture');
        // replay the rise animation on each new quote
        card.style.animation = 'none';
        void card.offsetWidth;
        card.style.animation = '';
        // run the countdown bar over the popup duration
        const ms = q.durationMs || 5000;
        bar.classList.remove('run');
        bar.style.transition = 'none';
        bar.style.transform = 'scaleX(1)';
        void bar.offsetWidth;
        bar.style.transition = 'transform ' + ms + 'ms linear';
        bar.style.transform = 'scaleX(0)';
      });
    </script>
  </body>
</html>
